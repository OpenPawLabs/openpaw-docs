<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore deep links saved by public/404.html before React Router mounts.
      (function () {
        var redirect = sessionStorage.getItem("spa-redirect");
        if (redirect) {
          sessionStorage.removeItem("spa-redirect");
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
    <script>
      // Apply stored theme before paint to avoid a flash (matches HeroUI useTheme).
      (function () {
        var theme = localStorage.getItem("heroui-theme") || "system";
        var resolved = theme;
        if (theme === "system") {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.classList.add(resolved);
        document.documentElement.setAttribute("data-theme", resolved);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Nunito:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="OpenPaw Labs DIY guides — step-by-step maker projects for VR and hardware."
    />
    <title>OpenPaw Labs Docs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
