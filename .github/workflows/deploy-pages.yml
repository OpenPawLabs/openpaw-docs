name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout openpaw-docs
        uses: actions/checkout@v5

      - name: Checkout diy-guides
        uses: actions/checkout@v5
        with:
          repository: OpenPawLabs/diy-guides
          path: diy-guides

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Use published @openpawlabs/diy-guides-ui
        run: node -e "const f='package.json',p=require('./'+f);delete p.pnpm;require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          DIY_GUIDES_PATH: ./diy-guides

      - name: Build
        run: pnpm build
        env:
          DIY_GUIDES_PATH: ./diy-guides

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
